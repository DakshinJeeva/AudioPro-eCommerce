version: "3.9"

services:
  # ── Microservices ────────────────────────────────────────────────────────────

  user-service:
    build:
      context: ./backend          # MUST be backend/ – shared sibling dirs needed
      dockerfile: user-service/Dockerfile
    container_name: user-service
    ports:
      - "5001:5001"
    env_file: ./backend/.env
    environment:
      - USER_SERVICE_PORT=5001
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped

  product-service:
    build:
      context: ./backend
      dockerfile: product-service/Dockerfile
    container_name: product-service
    ports:
      - "5002:5002"
    env_file: ./backend/.env
    environment:
      - PRODUCT_SERVICE_PORT=5002
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads_data:/app/uploads   # shared upload volume
    restart: unless-stopped

  order-service:
    build:
      context: ./backend
      dockerfile: order-service/Dockerfile
    container_name: order-service
    ports:
      - "5003:5003"
    env_file: ./backend/.env
    environment:
      - ORDER_SERVICE_PORT=5003
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - user-service
      - product-service
    restart: unless-stopped

  mcp-service:
    build:
      context: ./backend
      dockerfile: mcp-service/Dockerfile
    container_name: mcp-service
    ports:
      - "5004:5004"
    env_file: ./backend/.env
    environment:
      - MCP_SERVICE_PORT=5004
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - order-service
    restart: unless-stopped

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: frontend-container
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # Vite dev proxy targets – resolve inside Docker network by service name
      - VITE_USER_API_URL=http://user-service:5001
      - VITE_PRODUCT_API_URL=http://product-service:5002
      - VITE_ORDER_API_URL=http://order-service:5003
      - VITE_MCP_API_URL=http://mcp-service:5004
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - user-service
      - product-service
      - order-service
    restart: unless-stopped

# ── Shared volumes ────────────────────────────────────────────────────────────
volumes:
  uploads_data: