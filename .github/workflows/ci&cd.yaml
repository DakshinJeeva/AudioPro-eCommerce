name: CI — CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: audiopro-local
  # Opt all JS-based actions into Node 24 to silence deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Lint / Test ───────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      # Expand this step when you add Jest / Mocha tests
      - name: Run backend tests
        working-directory: backend
        run: npm test --if-present

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test --if-present

  # ── 2. Build & Validate via Kind ─────────────────────────────────────────────
  build-and-kind-test:
    name: Build & Verify Cluster Ecosystem
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Generate backend/.env from GitHub Secrets ────────────────────────────
      - name: Create backend .env from GitHub Secrets
        run: |
          printf '%s\n' \
            'PORT=5000' \
            'USER_SERVICE_PORT=5001' \
            'PRODUCT_SERVICE_PORT=5002' \
            'ORDER_SERVICE_PORT=5003' \
            'MCP_SERVICE_PORT=5004' \
            'CART_SERVICE_PORT=5005' \
            'PAYMENT_SERVICE_PORT=5006' \
            'FRONTEND_URL=http://localhost:5173' \
            'JWT_EXPIRES_IN=7d' \
            'KAFKA_BROKER=kafka:9092' \
            'REDIS_URL=redis://redis:6379' \
            'CART_SERVICE_URL=http://cart-service:5005' \
            'ORDER_SERVICE_URL=http://order-service:5003' \
            'PRODUCT_SERVICE_URL=http://product-service:5002' \
            'VITE_USER_API_URL=http://user-service:5001' \
            'VITE_PRODUCT_API_URL=http://product-service:5002' \
            'VITE_ORDER_API_URL=http://order-service:5003' \
            'VITE_MCP_API_URL=http://mcp-service:5004' \
            "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            "MONGO_URI=${{ secrets.MONGO_URI }}" \
            "INTERNAL_SERVICE_SECRET=${{ secrets.INTERNAL_SERVICE_SECRET }}" \
            "SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }}" \
            "SENDGRID_FROM_EMAIL=${{ secrets.SENDGRID_FROM_EMAIL }}" \
            "CONTACT_EMAIL_USER=${{ secrets.CONTACT_EMAIL_USER }}" \
            "CONTACT_EMAIL_PASS=${{ secrets.CONTACT_EMAIL_PASS }}" \
            "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}" \
            "VITE_STRIPE_KEY=${{ secrets.VITE_STRIPE_KEY }}" \
            "TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}" \
            "TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}" \
            "TWILIO_FROM_NUMBER=${{ secrets.TWILIO_FROM_NUMBER }}" \
            "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" \
          > backend/.env

      # ── Docker Buildx for layer caching ──────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Spin up Kind cluster ──────────────────────────────────────────────────
      - name: Create Kind Cluster
        uses: helm/kind-action@v1.10.0
        with:
          version: "v0.23.0"
          kubectl_version: "v1.30.0"
          cluster_name: kind   # Must be 'kind' — 'kind load docker-image' relies on this name

      - name: Verify Cluster Connectivity
        run: |
          kubectl cluster-info
          kubectl get nodes

      # ── Build all service images ──────────────────────────────────────────────
      - name: Build Local User Service
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/user-service/Dockerfile
          push: false
          tags: ${{ env.IMAGE_PREFIX }}/user-service:local
          load: true
          cache-from: type=gha,scope=user-service
          cache-to: type=gha,scope=user-service,mode=max

      - name: Build Local Product Service
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/product-service/Dockerfile
          push: false
          tags: ${{ env.IMAGE_PREFIX }}/product-service:local
          load: true
          cache-from: type=gha,scope=product-service
          cache-to: type=gha,scope=product-service,mode=max

      - name: Build Local Order Service
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/order-service/Dockerfile
          push: false
          tags: ${{ env.IMAGE_PREFIX }}/order-service:local
          load: true
          cache-from: type=gha,scope=order-service
          cache-to: type=gha,scope=order-service,mode=max

      - name: Build Local Cart Service
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/cart-service/Dockerfile
          push: false
          tags: ${{ env.IMAGE_PREFIX }}/cart-service:local
          load: true
          cache-from: type=gha,scope=cart-service
          cache-to: type=gha,scope=cart-service,mode=max

      - name: Build Local Payment Service
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/payment-service/Dockerfile
          push: false
          tags: ${{ env.IMAGE_PREFIX }}/payment-service:local
          load: true
          cache-from: type=gha,scope=payment-service
          cache-to: type=gha,scope=payment-service,mode=max

      - name: Build Local MCP Service
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/mcp-service/Dockerfile
          push: false
          tags: ${{ env.IMAGE_PREFIX }}/mcp-service:local
          load: true
          cache-from: type=gha,scope=mcp-service
          cache-to: type=gha,scope=mcp-service,mode=max

      - name: Build Local Frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          tags: ${{ env.IMAGE_PREFIX }}/frontend:local
          load: true
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      # ── Load all images into Kind ─────────────────────────────────────────────
      - name: Load Images into Kind Node Engine
        run: |
          kind load docker-image ${{ env.IMAGE_PREFIX }}/user-service:local
          kind load docker-image ${{ env.IMAGE_PREFIX }}/product-service:local
          kind load docker-image ${{ env.IMAGE_PREFIX }}/order-service:local
          kind load docker-image ${{ env.IMAGE_PREFIX }}/cart-service:local
          kind load docker-image ${{ env.IMAGE_PREFIX }}/payment-service:local
          kind load docker-image ${{ env.IMAGE_PREFIX }}/mcp-service:local
          kind load docker-image ${{ env.IMAGE_PREFIX }}/frontend:local

      # ── NGINX Ingress Controller ──────────────────────────────────────────────
      - name: Prepare Kind Node for Ingress
        run: |
          echo "🔧 Labeling node for ingress..."
          kubectl label node kind-control-plane ingress-ready=true

          echo "🔍 Verifying labels..."
          kubectl get nodes --show-labels

      - name: Install NGINX Ingress Controller for Kind
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.1/deploy/static/provider/kind/deploy.yaml

          echo "⏳ Waiting for ingress-nginx admission webhook jobs to complete..."
          kubectl wait --namespace ingress-nginx \
            --for=condition=complete job \
            --selector=app.kubernetes.io/component=admission-webhook \
            --timeout=60s || true

          echo "⏳ Waiting for ingress-nginx controller pod to become ready..."
          kubectl wait --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=180s || {
              echo "❌ Controller not ready — dumping diagnostics:"
              kubectl get pods -n ingress-nginx -o wide
              kubectl describe pod -n ingress-nginx -l app.kubernetes.io/component=controller
              exit 1
            }

      # ── Deploy & verify all manifests ────────────────────────────────────────
      - name: Test Apply App Manifests to Kind
        run: |
          # 1. Create namespace (idempotent)
          kubectl create namespace audiopro --dry-run=client -o yaml | kubectl apply -f -

          # 2. Create the single audiopro-secrets Secret used by all manifests
          kubectl create secret generic audiopro-secrets \
            --namespace=audiopro \
            --from-env-file=backend/.env \
            --dry-run=client -o yaml | kubectl apply -f -

          # 3. Apply local storage mock patch if present
          if [ -f k8s/local-storage-alias.yaml ]; then kubectl apply -f k8s/local-storage-alias.yaml; fi

          # 4. Apply all k8s manifests (ordered by filename prefix 00–13)
          kubectl apply -f k8s/

          # 5. Wait for infrastructure pods first
          echo "⏳ Waiting for infrastructure pods..."
          kubectl rollout status deployment/redis -n audiopro --timeout=90s
          kubectl rollout status deployment/kafka -n audiopro --timeout=120s

          # 6. Wait for backend microservices
          echo "⏳ Waiting for backend microservices..."
          kubectl rollout status deployment/user-service    -n audiopro --timeout=180s
          kubectl rollout status deployment/product-service -n audiopro --timeout=180s
          kubectl rollout status deployment/order-service   -n audiopro --timeout=180s
          kubectl rollout status deployment/cart-service    -n audiopro --timeout=180s
          kubectl rollout status deployment/payment-service -n audiopro --timeout=180s
          kubectl rollout status deployment/mcp-service     -n audiopro --timeout=180s

          # 7. Wait for frontend (Vite dev server takes longer)
          echo "⏳ Waiting for frontend..."
          kubectl rollout status deployment/frontend -n audiopro --timeout=600s

          echo "✅ All deployments healthy!"

      # ── Debug diagnostics on any failure ────────────────────────────────────
      - name: Debug Cluster on Failure
        if: failure()
        run: |
          echo "=== KUBERNETES PODS STATUS ==="
          kubectl get pods -n audiopro -o wide || true

          echo "=== EVENTS (sorted by time) ==="
          kubectl get events -n audiopro --sort-by='.lastTimestamp' | tail -40 || true

          echo "=== KAFKA LOGS ==="
          kubectl logs -n audiopro deployment/kafka --tail=50 || true

          echo "=== REDIS LOGS ==="
          kubectl logs -n audiopro deployment/redis --tail=30 || true

          echo "=== USER SERVICE LOGS ==="
          kubectl logs -n audiopro deployment/user-service --all-containers=true --tail=50 || true

          echo "=== PRODUCT SERVICE LOGS ==="
          kubectl logs -n audiopro deployment/product-service --all-containers=true --tail=50 || true

          echo "=== ORDER SERVICE LOGS ==="
          kubectl logs -n audiopro deployment/order-service --all-containers=true --tail=50 || true

          echo "=== CART SERVICE LOGS ==="
          kubectl logs -n audiopro deployment/cart-service --all-containers=true --tail=50 || true

          echo "=== PAYMENT SERVICE LOGS ==="
          kubectl logs -n audiopro deployment/payment-service --all-containers=true --tail=50 || true

          echo "=== MCP SERVICE LOGS ==="
          kubectl logs -n audiopro deployment/mcp-service --all-containers=true --tail=50 || true

          echo "=== FRONTEND LOGS ==="
          kubectl logs -n audiopro deployment/frontend --all-containers=true --tail=100 || true

          echo "=== ALL POD DESCRIPTIONS ==="
          kubectl describe pods -n audiopro || true
