# ──────────────────────────────────────────────────────────────────────────────
# 12-payment-service.yaml
# Deployment + ClusterIP Service for the Payment microservice (port 5006).
# Handles: Stripe payment intent creation, payment success → Kafka publish.
# Depends on user-service and cart-service.
# ──────────────────────────────────────────────────────────────────────────────

# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: audiopro
  labels:
    app: payment-service
    tier: backend
    project: audiopro-ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: payment-service
        tier: backend
    spec:
      initContainers:
        - name: wait-for-user-service
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://user-service:5001/health; do
                echo "Waiting for user-service..."; sleep 3;
              done
        - name: wait-for-cart-service
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://cart-service:5005/health; do
                echo "Waiting for cart-service..."; sleep 3;
              done
      containers:
        - name: payment-service
          image: audiopro-local/payment-service:local
          imagePullPolicy: Never
          ports:
            - containerPort: 5006
          envFrom:
            - secretRef:
                name: audiopro-secrets
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "192Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5006
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5006
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

---
# ── ClusterIP Service ─────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: audiopro
  labels:
    app: payment-service
    project: audiopro-ecommerce
spec:
  selector:
    app: payment-service
  ports:
    - name: http
      port: 5006
      targetPort: 5006
      protocol: TCP
  type: ClusterIP
