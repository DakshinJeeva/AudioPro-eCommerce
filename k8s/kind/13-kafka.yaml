# ──────────────────────────────────────────────────────────────────────────────
# 13-kafka.yaml
#
# Single-node Kafka broker (KRaft mode) for the AudioPro cluster.
# DNS name inside the cluster: kafka:9092
#
# Uses apache/kafka:3.9.0 (KRaft mode — no Zookeeper required).
# Image must be pre-loaded into kind nodes via:
#   docker pull apache/kafka:3.9.0
#   kind load docker-image apache/kafka:3.9.0 --name kind
#
# All microservices read KAFKA_BROKER from the audiopro-secrets Secret.
# Set KAFKA_BROKER=kafka:9092 in 01-secret.yaml (already done).
# ──────────────────────────────────────────────────────────────────────────────

# ── Kafka Broker (KRaft) ──────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: audiopro
  labels:
    app: kafka
    project: audiopro-ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.9.0
          imagePullPolicy: Never
          ports:
            - containerPort: 9092
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@localhost:9093"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_LOG_DIRS
              value: "/tmp/kraft-combined-logs"
            - name: CLUSTER_ID
              value: "MkU3OEVBNTcwNTJENDM2Qg"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 6

---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: audiopro
  labels:
    app: kafka
    project: audiopro-ecommerce
spec:
  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
  type: ClusterIP
