# ──────────────────────────────────────────────────────────────────────────────
# k8s/10-redis.yaml
# Redis 7 Deployment + PVC + ClusterIP Service for the audiopro namespace.
#
# DNS inside the cluster:   redis://redis.audiopro.svc.cluster.local:6379
# Short form (same ns):     redis://redis:6379
#
# All microservices reach Redis via REDIS_URL=redis://redis:6379 (see 01-secret).
# ──────────────────────────────────────────────────────────────────────────────

# ── PersistentVolumeClaim (optional — keeps data across pod restarts) ──────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: audiopro
  labels:
    app: redis
    project: audiopro-ecommerce
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 512Mi          # Adjust as needed; cache is typically small

---
# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: audiopro
  labels:
    app: redis
    tier: cache
    project: audiopro-ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  strategy:
    type: Recreate            # Redis single-instance — Recreate avoids split-brain
  template:
    metadata:
      labels:
        app: redis
        tier: cache
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
              name: redis
          args:
            - redis-server
            - --save 60 1     # RDB snapshot: save if ≥1 key changed in 60 s
            - --loglevel warning
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          volumeMounts:
            - name: redis-data
              mountPath: /data
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-pvc

---
# ── ClusterIP Service ─────────────────────────────────────────────────────────
# DNS: redis.audiopro.svc.cluster.local  (short: redis)
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: audiopro
  labels:
    app: redis
    project: audiopro-ecommerce
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
  type: ClusterIP
