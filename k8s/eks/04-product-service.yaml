# ──────────────────────────────────────────────────────────────────────────────
# k8s/eks/04-product-service.yaml
# Deployment + ClusterIP Service for the Product microservice (port 5002).
# EKS variant: ECR image, gp2 EBS PVC for uploads, 2 replicas.
# ──────────────────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: audiopro
  labels:
    app: product-service
    tier: backend
    project: audiopro-ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: product-service
        tier: backend
    spec:
      containers:
        - name: product-service
          image: 227037612486.dkr.ecr.ap-south-2.amazonaws.com/audiopro/product-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5002
          envFrom:
            - secretRef:
                name: audiopro-secrets
          volumeMounts:
            - name: uploads-storage
              mountPath: /app/uploads
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: uploads-storage
          persistentVolumeClaim:
            claimName: uploads-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: audiopro
  labels:
    app: product-service
    project: audiopro-ecommerce
spec:
  selector:
    app: product-service
  ports:
    - name: http
      port: 5002
      targetPort: 5002
      protocol: TCP
  type: ClusterIP
