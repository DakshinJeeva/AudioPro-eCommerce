version: "3.8"

# ── Kafka Infrastructure (local development) ──────────────────────────────────
# Run with: docker-compose up -d
# Stop with: docker-compose down
#
# Kafka broker is reachable at localhost:9092 from the host machine.
# Services inside the same Docker network use "kafka:29092".

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: audiopro-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: audiopro-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"   # Accessible from the host (Node services running on host)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # PLAINTEXT_HOST: for connections from the host machine (localhost:9092)
      # PLAINTEXT:      for inter-container connections (kafka:29092)
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # ── Optional: Kafka UI for debugging topics / messages ─────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: audiopro-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
