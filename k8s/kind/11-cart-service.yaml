# ──────────────────────────────────────────────────────────────────────────────
# 11-cart-service.yaml
# Deployment + ClusterIP Service for the Cart microservice (port 5005).
# Handles: cart CRUD, Kafka consumer to clear cart after payment.
# Depends on user-service and product-service.
# ──────────────────────────────────────────────────────────────────────────────

# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: audiopro
  labels:
    app: cart-service
    tier: backend
    project: audiopro-ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: cart-service
        tier: backend
    spec:
      initContainers:
        - name: wait-for-user-service
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://user-service:5001/health; do
                echo "Waiting for user-service..."; sleep 3;
              done
        - name: wait-for-product-service
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://product-service:5002/health; do
                echo "Waiting for product-service..."; sleep 3;
              done
      containers:
        - name: cart-service
          image: audiopro-local/cart-service:local
          imagePullPolicy: Never
          ports:
            - containerPort: 5005
          envFrom:
            - secretRef:
                name: audiopro-secrets
          env:
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:5002"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "192Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5005
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5005
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

---
# ── ClusterIP Service ─────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: cart-service
  namespace: audiopro
  labels:
    app: cart-service
    project: audiopro-ecommerce
spec:
  selector:
    app: cart-service
  ports:
    - name: http
      port: 5005
      targetPort: 5005
      protocol: TCP
  type: ClusterIP
