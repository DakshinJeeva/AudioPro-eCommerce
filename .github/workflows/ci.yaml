name: CI — CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: audiopro-local

jobs:
  # ── 1. Lint / Test ───────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      # Expand this step when you add Jest / Mocha tests
      - name: Run backend tests
        working-directory: backend
        run: npm test --if-present

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test --if-present

  # ── 2. Build & Validate via Kind ──────────────────────────────────────────────
  build-and-kind-test:
    name: Build & Verify Cluster Ecosystem
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up local multi-stage caching layers to keep execution times low
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # SPIN UP A TEMP KIND CLUSTER INSIDE GITHUB ACTIONS RUNNER
      - name: Create Kind Cluster
        uses: engineerd/setup-kind@v0.6.0
        with:
          version: "v0.22.0" # Keeps matching modern cluster environments

      - name: Verify Cluster Connectivity
        run: |
          kubectl cluster-info
          kubectl get nodes

      # BUILD IMAGES LOCALLY INSIDE THE GITHUB RUNNER WORKSPACE
      - name: Build Local User Service
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/user-service/Dockerfile
          push: false # Do not push to docker hub, keep it raw inside the runner
          tags: ${{ env.IMAGE_PREFIX }}/user-service:local
          load: true  # Exports the container directly to the local runner's docker daemon
          cache-from: type=gha,scope=user-service
          cache-to: type=gha,scope=user-service,mode=max

      - name: Build Local Product Service
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/product-service/Dockerfile
          push: false
          tags: ${{ env.IMAGE_PREFIX }}/product-service:local
          load: true
          cache-from: type=gha,scope=product-service
          cache-to: type=gha,scope=product-service,mode=max

      - name: Build Local Order Service
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/order-service/Dockerfile
          push: false
          tags: ${{ env.IMAGE_PREFIX }}/order-service:local
          load: true
          cache-from: type=gha,scope=order-service
          cache-to: type=gha,scope=order-service,mode=max

      - name: Build Local MCP Service
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/mcp-service/Dockerfile
          push: false
          tags: ${{ env.IMAGE_PREFIX }}/mcp-service:local
          load: true
          cache-from: type=gha,scope=mcp-service
          cache-to: type=gha,scope=mcp-service,mode=max

      - name: Build Local Frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          tags: ${{ env.IMAGE_PREFIX }}/frontend:local
          load: true
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      # LOAD THE BUILT TARGET IMAGES STRAIGHT INTO KIND CACHE
      - name: Load Images into Kind Node Engine
        run: |
          kind load docker-image ${{ env.IMAGE_PREFIX }}/user-service:local
          kind load docker-image ${{ env.IMAGE_PREFIX }}/product-service:local
          kind load docker-image ${{ env.IMAGE_PREFIX }}/order-service:local
          kind load docker-image ${{ env.IMAGE_PREFIX }}/mcp-service:local
          kind load docker-image ${{ env.IMAGE_PREFIX }}/frontend:local

      # DRY-RUN AND DEPLOY VALIDATION TEST
      - name: Test Apply App Manifests to Kind
        run: |
          # 1. Stand up resources 
          kubectl create namespace audiopro --dry-run=client -o yaml | kubectl apply -f -
          
          # 2. Apply your local storage mock patch configuration if you have one
          if [ -f k8s/local-storage-alias.yaml ]; then kubectl apply -f k8s/local-storage-alias.yaml; fi
          
          # 3. Apply manifests (swapping any ECR/DockerHub images with your local ones if needed)
          cd k8s/
          # Apply your manifests
          kubectl apply -f .
          
          # 4. Wait up to 90 seconds to verify pods spin up without crashing or ImagePullBackOff loops
          echo "⏳ Waiting for cluster convergence status..."
          kubectl rollout status deployment/user-service -n audiopro --timeout=90s
          kubectl rollout status deployment/product-service -n audiopro --timeout=90s

  # ── 3. Production Publish (Only runs when code merges to main) ──────────────────
  production-registry-push:
    name: Tag & Push to Docker Hub (Main Only)
    runs-on: ubuntu-latest
    needs: build-and-kind-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        service: [user-service, product-service, order-service, mcp-service, frontend]
        include:
          - service: user-service
            dockerfile: backend/user-service/Dockerfile
            context: backend
          - service: product-service
            dockerfile: backend/product-service/Dockerfile
            context: backend
          - service: order-service
            dockerfile: backend/order-service/Dockerfile
            context: backend
          - service: mcp-service
            dockerfile: backend/mcp-service/Dockerfile
            context: backend
          - service: frontend
            dockerfile: frontend/Dockerfile
            context: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/audiopro-${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Push Production Release Build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}-prod
          cache-to: type=gha,scope=${{ matrix.service }}-prod,mode=max