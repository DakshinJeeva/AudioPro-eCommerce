# ──────────────────────────────────────────────────────────────────────────────
# k8s/eks/07-frontend.yaml
# Deployment + ClusterIP Service for the Vite React frontend (port 5173).
# EKS variant: ECR image, 2 replicas.
# ──────────────────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: audiopro
  labels:
    app: frontend
    tier: frontend
    project: audiopro-ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: 227037612486.dkr.ecr.ap-south-2.amazonaws.com/audiopro/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5173
          envFrom:
            - secretRef:
                name: audiopro-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: audiopro
  labels:
    app: frontend
    project: audiopro-ecommerce
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 5173
      targetPort: 5173
      protocol: TCP
  type: ClusterIP
