version: "3.9"

services:
  backend:
    build: ./backend
    container_name: backend-container
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - PORT=5000
    restart: always

  frontend:
    build: ./frontend
    container_name: frontend-container
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # Used by the Vite server-side proxy (inside Docker network), NOT sent to the browser
      - VITE_API_URL=http://backend:5000
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    restart: always