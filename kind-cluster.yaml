kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

nodes:
- role: control-plane
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "ingress-ready=true"

  extraPortMappings:
  - containerPort: 80      # ingress-nginx controller binds to hostPort 80 directly
    hostPort: 80
    protocol: TCP
  - containerPort: 443     # ingress-nginx controller binds to hostPort 443 directly
    hostPort: 443
    protocol: TCP

- role: worker
- role: worker