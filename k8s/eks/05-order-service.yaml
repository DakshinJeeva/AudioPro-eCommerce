# ──────────────────────────────────────────────────────────────────────────────
# k8s/eks/05-order-service.yaml
# Deployment + ClusterIP Service for the Order microservice (port 5003).
# EKS variant: ECR image, 2 replicas.
# ──────────────────────────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: audiopro
  labels:
    app: order-service
    tier: backend
    project: audiopro-ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: order-service
        tier: backend
    spec:
      containers:
        - name: order-service
          image: 227037612486.dkr.ecr.ap-south-2.amazonaws.com/audiopro/order-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5003
          envFrom:
            - secretRef:
                name: audiopro-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: audiopro
  labels:
    app: order-service
    project: audiopro-ecommerce
spec:
  selector:
    app: order-service
  ports:
    - name: http
      port: 5003
      targetPort: 5003
      protocol: TCP
  type: ClusterIP
