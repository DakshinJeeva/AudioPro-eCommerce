# ──────────────────────────────────────────────────────────────────────────────
# 05-order-service.yaml
# Deployment + ClusterIP Service for the Order microservice (port 5003).
# Handles: cart, orders, Stripe payment.
# Depends on user-service and product-service (Kubernetes resolves via DNS).
# ──────────────────────────────────────────────────────────────────────────────

# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: audiopro
  labels:
    app: order-service
    tier: backend
    project: audiopro-ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: order-service
        tier: backend
    spec:
      # Kubernetes doesn't have a hard "depends_on" — instead we rely on
      # readiness probes + retry logic in the app. The initContainer below
      # acts as a lightweight wait gate (mirrors docker-compose depends_on).
      initContainers:
        - name: wait-for-user-service
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://user-service:5001/health; do
                echo "Waiting for user-service..."; sleep 3;
              done
        - name: wait-for-product-service
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://product-service:5002/health; do
                echo "Waiting for product-service..."; sleep 3;
              done
      containers:
        - name: order-service
          image: audiopro/order-service:local
          imagePullPolicy: Never
          ports:
            - containerPort: 5003
          envFrom:
            - secretRef:
                name: audiopro-secret
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

---
# ── ClusterIP Service ─────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: audiopro
  labels:
    app: order-service
    project: audiopro-ecommerce
spec:
  selector:
    app: order-service
  ports:
    - name: http
      port: 5003
      targetPort: 5003
      protocol: TCP
  type: ClusterIP
