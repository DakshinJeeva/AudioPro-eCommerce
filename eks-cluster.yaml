apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: audiopro-prod
  region: ap-south-2
  version: "1.30" # Uses a stable, fully-supported Kubernetes version

managedNodeGroups:
  - name: audiopro-workers
    instanceType: t3.medium  # 2 vCPUs, 2GB RAM — perfect for running your 5 microservices smoothly
    desiredCapacity: 3       # Starts with 1 virtual machine for high availability
    minSize: 2
    maxSize: 3
    volumeSize: 30           # 30GB disk space per worker node
    privateNetworking: true  # Keeps your worker nodes safely hidden from the public internet