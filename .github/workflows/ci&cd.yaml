name: CI — CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: audiopro-local
  # Opt all JS-based actions into Node 24 to silence deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Lint / Test ───────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      # Expand this step when you add Jest / Mocha tests
      - name: Run backend tests
        working-directory: backend
        run: npm test --if-present

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test --if-present

  # ── 2. Build & Validate via Kind ──────────────────────────────────────────────
  build-and-kind-test:
    name: Build & Verify Cluster Ecosystem
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create backend .env from GitHub Secrets
        run: |
          printf '%s\n' \
            'PORT=5000' \
            'USER_SERVICE_PORT=5001' \
            'PRODUCT_SERVICE_PORT=5002' \
            'ORDER_SERVICE_PORT=5003' \
            'MCP_SERVICE_PORT=5004' \
            'FRONTEND_URL=http://localhost:5173' \
            'JWT_EXPIRES_IN=7d' \
            "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            "MONGO_URI=${{ secrets.MONGO_URI }}" \
            "SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }}" \
            "SENDGRID_FROM_EMAIL=${{ secrets.SENDGRID_FROM_EMAIL }}" \
            "CONTACT_EMAIL_USER=${{ secrets.CONTACT_EMAIL_USER }}" \
            "CONTACT_EMAIL_PASS=${{ secrets.CONTACT_EMAIL_PASS }}" \
            "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}" \
            "VITE_STRIPE_KEY=${{ secrets.VITE_STRIPE_KEY }}" \
            "TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}" \
            "TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}" \
            "TWILIO_FROM_NUMBER=${{ secrets.TWILIO_FROM_NUMBER }}" \
            "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" \
          > backend/.env

      # Set up local multi-stage caching layers to keep execution times low
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # SPIN UP A TEMP KIND CLUSTER INSIDE GITHUB ACTIONS RUNNER
      - name: Create Kind Cluster
        uses: helm/kind-action@v1.10.0
        with:
          version: "v0.23.0"       # Keeps matching modern cluster environments
          kubectl_version: "v1.30.0"
          cluster_name: kind        # Must be 'kind' — default is 'chart-testing', breaking 'kind load docker-image'

      - name: Verify Cluster Connectivity
        run: |
          kubectl cluster-info
          kubectl get nodes

      # BUILD IMAGES LOCALLY INSIDE THE GITHUB RUNNER WORKSPACE
      - name: Build Local User Service
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/user-service/Dockerfile
          push: false # Do not push to docker hub, keep it raw inside the runner
          tags: ${{ env.IMAGE_PREFIX }}/user-service:local
          load: true  # Exports the container directly to the local runner's docker daemon
          cache-from: type=gha,scope=user-service
          cache-to: type=gha,scope=user-service,mode=max

      - name: Build Local Product Service
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/product-service/Dockerfile
          push: false
          tags: ${{ env.IMAGE_PREFIX }}/product-service:local
          load: true
          cache-from: type=gha,scope=product-service
          cache-to: type=gha,scope=product-service,mode=max

      - name: Build Local Order Service
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/order-service/Dockerfile
          push: false
          tags: ${{ env.IMAGE_PREFIX }}/order-service:local
          load: true
          cache-from: type=gha,scope=order-service
          cache-to: type=gha,scope=order-service,mode=max

      - name: Build Local MCP Service
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/mcp-service/Dockerfile
          push: false
          tags: ${{ env.IMAGE_PREFIX }}/mcp-service:local
          load: true
          cache-from: type=gha,scope=mcp-service
          cache-to: type=gha,scope=mcp-service,mode=max

      - name: Build Local Frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          tags: ${{ env.IMAGE_PREFIX }}/frontend:local
          load: true
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      # LOAD THE BUILT TARGET IMAGES STRAIGHT INTO KIND CACHE
      - name: Load Images into Kind Node Engine
        run: |
          kind load docker-image ${{ env.IMAGE_PREFIX }}/user-service:local
          kind load docker-image ${{ env.IMAGE_PREFIX }}/product-service:local
          kind load docker-image ${{ env.IMAGE_PREFIX }}/order-service:local
          kind load docker-image ${{ env.IMAGE_PREFIX }}/mcp-service:local
          kind load docker-image ${{ env.IMAGE_PREFIX }}/frontend:local

      # INSTALL NGINX INGRESS CONTROLLER
      # 09-nginx-configmap.yaml targets the ingress-nginx namespace, which only
      - name: Prepare Kind Node for Ingress
        run: |
          echo "🔧 Labeling node for ingress..."
          kubectl label node kind-control-plane ingress-ready=true

          echo "🔍 Verifying labels..."
          kubectl get nodes --show-labels

      - name: Install NGINX Ingress Controller for Kind
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.1/deploy/static/provider/kind/deploy.yaml

          echo "⏳ Waiting for ingress-nginx admission webhook jobs to complete..."
          kubectl wait --namespace ingress-nginx \
            --for=condition=complete job \
            --selector=app.kubernetes.io/component=admission-webhook \
            --timeout=60s || true

          echo "⏳ Waiting for ingress-nginx controller pod to become ready..."
          kubectl wait --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=180s || {
              echo "❌ Controller not ready — dumping diagnostics:"
              kubectl get pods -n ingress-nginx -o wide
              kubectl describe pod -n ingress-nginx -l app.kubernetes.io/component=controller
              exit 1
            }

      # DRY-RUN AND DEPLOY VALIDATION TEST
      - name: Test Apply App Manifests to Kind
        run: |
          # 1. Stand up resources
          kubectl create namespace audiopro --dry-run=client -o yaml | kubectl apply -f -

          # 2. CREATE KUBERNETES SECRET FROM THE .ENV FILE 👈 (THE FIX)
          kubectl create secret generic audiopro-secrets \
            --namespace=audiopro \
            --from-env-file=backend/.env \
            --dry-run=client -o yaml | kubectl apply -f -

          # 3. Apply local storage mock patch if present
          if [ -f k8s/local-storage-alias.yaml ]; then kubectl apply -f k8s/local-storage-alias.yaml; fi

          # 4. Apply all app manifests — ingress-nginx namespace now exists
          kubectl apply -f k8s/

          # 5. Wait up to 180 seconds to verify pods spin up cleanly
          echo "⏳ Waiting for cluster convergence status..."
          kubectl rollout status deployment/user-service -n audiopro --timeout=180s
          kubectl rollout status deployment/product-service -n audiopro --timeout=180s
          kubectl rollout status deployment/order-service -n audiopro --timeout=180s
          kubectl rollout status deployment/mcp-service -n audiopro --timeout=180s
          kubectl rollout status deployment/frontend -n audiopro --timeout=300s

      # 👇 Debug step on failure — dumps full diagnostic state across all pods
      - name: Debug Cluster on Failure
        if: failure()
        run: |
          echo "=== KUBERNETES PODS STATUS ==="
          kubectl get pods -n audiopro -o wide || true

          echo "=== FRONTEND LOGS ==="
          kubectl logs -n audiopro deployment/frontend --all-containers=true --tail=100 || true

          echo "=== USER SERVICE LOGS ==="
          kubectl logs -n audiopro deployment/user-service --all-containers=true --tail=50 || true

          echo "=== ALL POD DESCRIPTIONS ==="
          kubectl describe pods -n audiopro || true
  # ── 3. Production Publish (Only runs when code merges to main) ──────────────────
  production-registry-push:
    name: Tag & Push to Docker Hub (Main Only)
    runs-on: ubuntu-latest
    needs: build-and-kind-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        service: [user-service, product-service, order-service, mcp-service, frontend]
        include:
          - service: user-service
            dockerfile: backend/user-service/Dockerfile
            context: backend
          - service: product-service
            dockerfile: backend/product-service/Dockerfile
            context: backend
          - service: order-service
            dockerfile: backend/order-service/Dockerfile
            context: backend
          - service: mcp-service
            dockerfile: backend/mcp-service/Dockerfile
            context: backend
          - service: frontend
            dockerfile: frontend/Dockerfile
            context: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/audiopro-${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Push Production Release Build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}-prod
          cache-to: type=gha,scope=${{ matrix.service }}-prod,mode=max